name: Deploy Suetolog Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Установка uv
        uses: astral-sh/setup-uv@v5

      - name: Установка зависимостей
        run: uv sync --all-extras --dev

      - name: Create pidor-of-the-day-af3dd140b860.json from secrets
        run: |
          cat <<'EOF' > pidor-of-the-day-af3dd140b860.json
          ${{ secrets.CONFIG_JSON }}
          EOF

      - name: Create passwords.py from secrets
        run: |
          cat <<'EOF' > paswords.py
          ${{ secrets.PASWORDS_PY }}
          EOF

      - name: Запуск тестов
        run: uv run pytest -v

  build_and_push_in_GHCR:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Вход в GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка Docker образа
        run: docker build -t ghcr.io/${{ github.repository_owner }}/suetolog-bot:latest .

      - name: Push Docker образ в GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/suetolog-bot:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push_in_GHCR

    steps:
      - name: Вход на сервер по SSH и деплой через docker compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="/root/suetolog_bot"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose не найден на сервере"
              exit 1
            fi

            docker network inspect tg-vpn-net >/dev/null 2>&1 || \
              docker network create --driver bridge --subnet 172.30.10.0/24 tg-vpn-net

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker rm -f suetolog-bot || true
            $COMPOSE_CMD -f docker-compose.yml up -d --build --remove-orphans

            docker ps --filter name=suetolog-bot
            docker inspect suetolog-bot --format '{{json .NetworkSettings.Networks}}'
