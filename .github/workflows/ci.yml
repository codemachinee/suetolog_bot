name: Deploy Suetolog Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read         # Разрешения на доступ к коду репозитория
  packages: write        # Разрешения на загрузку пакетов
  id-token: write        # Разрешения для работы с токенами
  actions: read          # Разрешения для работы с действиями

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: установка uv
        uses: astral-sh/setup-uv@v5

      - name: Установка зависимостей
        run: uv sync --all-extras --dev

      - name: Create pidor-of-the-day-af3dd140b860.json from secrets
        run: |
          cat <<'EOF' > pidor-of-the-day-af3dd140b860.json
          ${{ secrets.CONFIG_JSON }}
          EOF

      - name: Create passwords.py from secrets
        run: |
          cat <<'EOF' > paswords.py
          ${{ secrets.PASWORDS_PY }}
          EOF

      - name: Запуск тестов
        run: |
          uv run pytest -v

  build_and_push_in_GHCR:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Вход в GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка Docker образа
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/suetolog-bot:latest \
            -t ghcr.io/${{ github.repository_owner }}/suetolog-bot:${{ github.sha }} .

      - name: Push Docker образ в GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/suetolog-bot:latest
          docker push ghcr.io/${{ github.repository_owner }}/suetolog-bot:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push_in_GHCR

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Вход на сервер по SSH и деплой
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="/root/suetolog_bot"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # Обновляем исходный код на сервере
            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin
            git reset --hard ${{ github.sha }}

            # Входим в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Останавливаем и удаляем старый контейнер, если он есть
            docker rm -f suetolog-bot || true
            
            # Очистка неиспользуемых данных (аккуратно, чтобы не снести лишнего)
            docker system prune -f

            # Запускаем контейнер из образа с конкретным SHA
            docker run -d \
              --name suetolog-bot \
              --restart unless-stopped \
              -e KINOPHILES_DB_PATH=/data/kinophiles.db \
              -v "$REPO_DIR/paswords.py:/app/paswords.py:ro" \
              -v "$REPO_DIR/pidor-of-the-day-af3dd140b860.json:/app/pidor-of-the-day-af3dd140b860.json:ro" \
              -v "$REPO_DIR/loggs.log:/app/loggs.log" \
              -v "$REPO_DIR/kinophiles.db:/data/kinophiles.db" \
              ghcr.io/${{ github.repository_owner }}/suetolog-bot:${{ github.sha }}
